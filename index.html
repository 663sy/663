<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的理想城市测验</title>
    <style>
     body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f5f5f7;
    padding: 20px;
    box-sizing: border-box;
    color: #1d1d1f;
}

#app-container {
    width: 100%;
    max-width: 500px;
    background: #ffffff;
    padding: 40px 32px;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}

.hidden { display: none !important; }

#question-text {
    font-size: 1.15rem;
    line-height: 1.6;
    margin-bottom: 24px;
    color: #1d1d1f;
    font-weight: 600;
    letter-spacing: -0.01em;
}

svg {
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: #e5e5ea;
    margin-bottom: 32px;
}

#progress-bar {
    fill: #1d1d1f;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.option-btn {
    display: block;
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 10px;
    border: 1px solid #e5e5ea;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    background: #ffffff;
    font-size: 0.95rem;
    color: #1d1d1f;
    line-height: 1.5;
    transition: all 0.15s ease;
    box-sizing: border-box;
    font-weight: 400;
    letter-spacing: -0.01em;
}

.option-btn:hover {
    background: #f5f5f7;
    border-color: #c7c7cc;
}

.option-btn:active {
    transform: scale(0.98);
    background: #ebebeb;
}

#result-city-name {
    font-size: 1.6rem;
    color: #1d1d1f;
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: -0.03em;
}

#result-description {
    white-space: pre-wrap;
    line-height: 1.75;
    color: #6e6e73;
    text-align: justify;
    font-size: 0.95rem;
}

button[onclick="location.reload()"] {
    margin-top: 32px;
    width: 100%;
    padding: 14px;
    background: #1d1d1f;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: -0.01em;
}

button[onclick="location.reload()"]:active {
    opacity: 0.8;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.fade-in {
    animation: fadeIn 0.35s ease forwards;
}result-screen
    </style>
</head>
<body>

<div id="app-container">
    <svg>
        <rect id="progress-bar" x="0" y="0" width="0%" height="100%"></rect>
    </svg>

    <div id="question-screen">
        <h2 id="question-text">题目加载中...</h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>你的灵魂归属地：</h2>
        <h1 id="result-city-name">城市名称</h1>
        <div id="result-description">正在生成你的专属报告...</div>
        <button onclick="location.reload()">重新测试</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
